name: AI Feishu Digest

env:
  # Opt into Node.js 24 for JavaScript-based actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # GitHub Actions schedule is UTC. 08:00 Beijing = 00:00 UTC.
    - cron: "0 0 * * *"
  workflow_dispatch: {}

concurrency:
  group: ai-feishu-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ai_feishu_digest/requirements.txt

      - name: Generate digest
        run: |
          python ai_feishu_digest/digest.py > ai_feishu_digest/out.md

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-tech-digest
          path: ai_feishu_digest/out.md

      - name: Send digest
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          WEIXIN_WEBHOOK: ${{ secrets.WEIXIN_WEBHOOK }}
          FEISHU_SIGNING_SECRET: ${{ secrets.FEISHU_SIGNING_SECRET }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          BAIDU_FANYI_APPID: ${{ secrets.BAIDU_FANYI_APPID }}
          BAIDU_APIKEY: ${{ secrets.BAIDU_APIKEY }}
        run: |
          python ai_feishu_digest/push.py --markdown-file ai_feishu_digest/out.md
